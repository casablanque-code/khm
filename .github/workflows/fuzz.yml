name: Fuzz

on:
  schedule:
    - cron: "0 4 * * 1"   # weekly, Monday 04:00 UTC
  workflow_dispatch: {}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fuzz (bounded, checked-in corpus + short exploration)
        run: make fuzz-smoke

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: |
            crash-*
            tests/fuzz/crash-*
          if-no-files-found: ignore
